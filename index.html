<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Álgebra y Geometría — Apuntes</title>
<style>
  html { font-size: 18px; }
  body {
    max-width: 44rem;
    margin: 0 auto;
    padding: 2.2rem 1.5rem 4rem;
    line-height: 1.6;
    font-family: Georgia, "Times New Roman", serif;
    color: #1a1a1a;
    background: #fff;
  }
  .lang-bar { text-align: right; margin-bottom: 0.4rem; }
  .lang-bar button {
    font: inherit;
    font-size: 0.85rem;
    background: none;
    border: 1px solid #ccc;
    border-radius: 6px 0 0 6px;
    padding: 0.15rem 0.7rem;
    cursor: pointer;
    color: #555;
  }
  .lang-bar button + button { border-radius: 0 6px 6px 0; border-left: none; }
  .lang-bar button.activo {
    background: #1a5fb4;
    border-color: #1a5fb4;
    color: #fff;
    cursor: default;
  }
  h1 { line-height: 1.25; margin: 0 0 0.2em; }
  .sub { color: #555; margin-top: 0; }
  ul.modulos { list-style: none; padding: 0; }
  ul.modulos li {
    margin: 0.9rem 0;
    padding: 0.9rem 1.1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }
  ul.modulos a.mod { font-size: 1.05rem; text-decoration: none; color: #1a5fb4; }
  ul.modulos a.mod:hover { text-decoration: underline; }
  ul.modulos a.pdf { font-size: 0.85rem; color: #777; text-decoration: none; white-space: nowrap; }
  ul.modulos a.pdf:hover { text-decoration: underline; }
  .nota {
    font-size: 0.9rem;
    color: #555;
    border-left: 3px solid #ccc;
    padding-left: 1rem;
    margin-top: 2.5rem;
  }
  .como-usar { margin: 1.6rem 0 0.2rem; }
  .como-usar a { font-size: 0.95rem; color: #1a5fb4; text-decoration: none; }
  .como-usar a:hover { text-decoration: underline; }
  .lang-bar a.tema {
    font-size: 0.95rem;
    text-decoration: none;
    margin-left: 0.6rem;
    vertical-align: middle;
    /* fuente emoji: Georgia pintaba el icono como un glifo raro */
    font-family: "Segoe UI Emoji", "Noto Color Emoji", "Apple Color Emoji", sans-serif;
  }

  /* ── Modo noche (html.dark) ── */
  html.dark { background: #14161a; }
  html.dark body { background: #14161a; color: #d6d6d6; }
  html.dark .sub, html.dark .nota { color: #a8a8a8; }
  html.dark .nota { border-left-color: #4a4f58; }
  html.dark ul.modulos li { border-color: #3a3f47; }
  html.dark ul.modulos a.mod { color: #85b4ea; }
  html.dark ul.modulos a.pdf { color: #9a9a9a; }
  html.dark .lang-bar button { border-color: #4a4f58; color: #a8a8a8; background: none; }
  html.dark .lang-bar button.activo { background: #2c66ad; border-color: #2c66ad; color: #fff; }
</style>
</head>
<body>
<div class="lang-bar" role="group" aria-label="Idioma / Language">
  <button id="btn-es" onclick="setLang('es')">Español</button><button id="btn-en" onclick="setLang('en')">English</button><a class="tema" id="btn-tema" href="#" onclick="toggleTheme(); return false;" title="Modo noche/día">🌙</a>
</div>

<h1 id="t-titulo">Álgebra y Geometría</h1>
<p class="sub" id="t-sub">Apuntes del curso — Grado en Matemáticas y Filosofía</p>

<p class="como-usar"><a href="como-usar.html" id="t-como-usar"></a></p>

<ul class="modulos" id="lista"></ul>

<p class="nota" id="t-nota"></p>

<script>
// Portada bilingüe: un solo index, textos y enlaces según el idioma elegido.
// La elección persiste en localStorage ('lang') y los módulos la actualizan al
// navegarlos; la primera visita hereda el idioma del navegador.
var I18N = {
  es: {
    titulo: "Álgebra y Geometría",
    sub: "Apuntes del curso — Grado en Matemáticas y Filosofía",
    nota: "Material en elaboración.",
    pdf: "PDF",
    mods: ["Módulo 0 · Preliminares", "Módulo 1 · Aritmética", "Módulo 2 · Números complejos",
           "Módulo 3 · Polinomios", "Módulo 4 · Álgebra lineal", "Módulo 5 · Geometría"],
    comoUsar: "Cómo usar estos apuntes (★, Ampliación, figuras interactivas) →",
    htmlTitle: "Álgebra y Geometría — Apuntes",
  },
  en: {
    titulo: "Algebra and Geometry",
    sub: "Lecture notes — Degree in Mathematics and Philosophy",
    nota: "Work in progress.",
    pdf: "PDF",
    mods: ["Module 0 · Preliminaries", "Module 1 · Arithmetic", "Module 2 · Complex numbers",
           "Module 3 · Polynomials", "Module 4 · Linear algebra", "Module 5 · Geometry"],
    comoUsar: "How to use these notes (★, Going further, interactive figures) →",
    htmlTitle: "Algebra and Geometry — Lecture notes",
  },
};
var DIRS = ["00-preliminares", "01-aritmetica", "02-complejos",
            "03-polinomios", "04-lineal", "05-geometria"];

function setLang(lang) {
  localStorage.setItem('lang', lang);
  render(lang);
}

function render(lang) {
  var t = I18N[lang];
  var suf = lang === 'en' ? '-en' : '';
  document.documentElement.lang = lang;
  document.title = t.htmlTitle;
  document.getElementById('t-titulo').textContent = t.titulo;
  document.getElementById('t-sub').textContent = t.sub;
  document.getElementById('t-nota').textContent = t.nota;
  document.getElementById('t-como-usar').textContent = t.comoUsar;
  document.getElementById('btn-es').className = lang === 'es' ? 'activo' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'activo' : '';
  var ul = document.getElementById('lista');
  ul.innerHTML = '';
  DIRS.forEach(function (d, i) {
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.className = 'mod';
    a.href = 'apuntes-' + d + suf + '.html';
    a.textContent = t.mods[i];
    var p = document.createElement('a');
    p.className = 'pdf';
    p.href = 'apuntes-' + d + suf + '.pdf';
    p.textContent = t.pdf;
    li.appendChild(a);
    li.appendChild(p);
    ul.appendChild(li);
  });
}

var saved = localStorage.getItem('lang');
if (saved !== 'es' && saved !== 'en') {
  saved = (navigator.language || '').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
}
render(saved);

// ── Modo noche: mismo mecanismo que en los módulos (localStorage 'theme') ──
function applyTheme(t) {
  document.documentElement.classList.toggle('dark', t === 'dark');
  document.getElementById('btn-tema').textContent = t === 'dark' ? '☀' : '🌙';
}
function toggleTheme() {
  var d = !document.documentElement.classList.contains('dark');
  try { localStorage.setItem('theme', d ? 'dark' : 'light'); } catch (e) {}
  applyTheme(d ? 'dark' : 'light');
}
var th;
try { th = localStorage.getItem('theme'); } catch (e) {}
if (th !== 'dark' && th !== 'light') {
  th = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
applyTheme(th);
</script>
</body>
</html>
